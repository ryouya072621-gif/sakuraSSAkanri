<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | 業務分析レポート</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 380px; border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
    .login-header { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
    .login-header h5 { font-size: 1.25rem; font-weight: 700; margin: 0; }
    .login-header p { font-size: 0.85rem; opacity: 0.85; margin: 0.3rem 0 0; }
    .login-body { padding: 2rem; }
    .btn-login { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: #fff; width: 100%; padding: 0.7rem; font-weight: 600; border-radius: 8px; }
    .btn-login:hover { opacity: 0.9; color: #fff; }
    .form-control:focus { border-color: #6366f1; box-shadow: 0 0 0 0.2rem rgba(99,102,241,0.2); }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="login-header">
      <h5>📊 業務分析レポート</h5>
      <p>部門IDとパスワードでログイン</p>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">部門ID</label>
          <input type="text" name="username" class="form-control" placeholder="例: dept02" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">パスワード</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-login">ログイン</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
