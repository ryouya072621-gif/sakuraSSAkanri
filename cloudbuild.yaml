steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ssasakurakaitoukatu:$COMMIT_SHA', '.']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ssasakurakaitoukatu:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sakurassakanri'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ssasakurakaitoukatu:$COMMIT_SHA'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--timeout=300'
      - '--add-cloudsql-instances=elite-campus-480105-h9:asia-northeast1:ssasakura-db'
      - '--set-env-vars=CLOUD_SQL_CONNECTION_NAME=elite-campus-480105-h9:asia-northeast1:ssasakura-db,DB_USER=ssasakura-user,DB_NAME=ssasakura'
      - '--set-secrets=DB_PASSWORD=db-password:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ssasakurakaitoukatu:$COMMIT_SHA'
